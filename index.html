<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看图猜词小游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://hydrogen.bmob.cn/static/build/bmob-Min-3.6.1.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                    },
                    fontFamily: {
                        yuan: ['"Microsoft YaHei"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .word-btn { transition: all 0.2s; }
        .word-btn:active { transform: scale(0.95); }
        .answer-box { cursor: pointer; }
        #answerArea { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-yuan">

<div id="coverPage" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-xl w-full text-center">
        <h1 class="text-4xl font-bold text-primary mb-4">🏆 看图猜词游戏</h1>
        <p class="text-gray-600 mb-6">看图拼字，答对一题5分，限时10分钟</p>

        <div class="mb-6 p-4 bg-blue-50 rounded-xl">
            <h3 class="font-bold text-lg mb-2">📊 实时排行榜</h3>
            <div id="homeRank" class="text-left space-y-1 text-gray-500">连接数据库中...</div>
        </div>

        <button id="startBtn" class="bg-primary text-white text-xl font-bold py-3 px-8 rounded-xl w-full">
            开始猜图
        </button>
        <button id="rankBtn" class="mt-3 text-indigo-600 text-sm underline">查看完整排行榜</button>
        <p class="text-gray-500 mt-4 text-sm">已有 <span id="playerCount" class="font-bold text-indigo-600">0</span> 位同学参与</p>
    </div>
</div>

<div id="nameModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4">
        <h2 class="text-xl font-bold mb-4 text-center">请输入姓名</h2>
        <input id="playerName" class="w-full border border-gray-300 rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="输入你的名字（必填）">
        <div class="flex gap-2">
            <button id="cancelName" class="flex-1 bg-gray-200 py-2 rounded-lg hover:bg-gray-300">取消</button>
            <button id="okName" class="flex-1 bg-primary text-white py-2 rounded-lg hover:opacity-90">开始游戏</button>
        </div>
    </div>
</div>

<div id="gamePage" class="min-h-screen p-4 hidden">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow mb-3">
            <div class="font-bold text-gray-700">⏱️ <span id="timer">10:00</span></div>
            <div class="font-bold text-primary text-lg">⭐ 得分：<span id="score">0</span></div>
            <div class="font-bold text-gray-700"><span id="curr">1</span>/<span id="total">5</span></div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow mb-4 text-center">
            <p class="text-gray-500 text-sm mb-3">看图猜词，点击字库拼答案，点答案框可清除</p>
            <img id="img" src="" onerror="this.src='https://placehold.co/600x400?text=图片丢失啦'" class="max-h-64 mx-auto rounded-lg shadow mb-4 object-contain">
            <div id="answerArea" class="mb-4 min-h-[48px]"></div>

            <div class="flex justify-center gap-4 mt-3">
                <button id="prevBtn" class="bg-gray-400 hover:bg-gray-500 text-white py-2 px-5 rounded-lg transition-colors">← 上一题</button>
                <button id="nextBtn" class="bg-primary hover:opacity-90 text-white py-2 px-5 rounded-lg transition-colors shadow-md">下一题 →</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow">
            <div id="wordBank" class="grid grid-cols-6 gap-2 sm:gap-3"></div>
        </div>

        <div class="text-center mt-6">
            <button id="teacherBtn" class="text-gray-400 text-sm hover:text-gray-600 underline">👨‍🏫 老师查看答题记录</button>
        </div>
    </div>
</div>

<div id="judgeModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 text-center max-w-sm w-full mx-4">
        <h2 id="judgeText" class="text-2xl font-bold mb-2"></h2>
        <p class="mb-6 text-gray-600" id="rightAns"></p>
        <button id="nextQ" class="bg-primary text-white px-8 py-3 rounded-xl font-bold w-full hover:opacity-90 shadow-lg">下一题</button>
    </div>
</div>

<div id="resultModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 text-center max-w-sm w-full mx-4">
        <h2 class="text-2xl font-bold mb-2">🎉 答题完成</h2>
        <p class="text-xl mb-6 text-gray-700">最终得分：<span id="final" class="text-primary font-bold text-3xl">0</span> 分</p>
        <div class="flex gap-3">
            <button id="goRank" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-bold">查看排行榜</button>
            <button id="goHome" class="flex-1 bg-primary hover:opacity-90 text-white py-3 rounded-xl font-bold">返回首页</button>
        </div>
    </div>
</div>

<div id="rankModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto mx-4">
        <h2 class="text-xl font-bold mb-4 text-center">🏅 完整排行榜</h2>
        <div id="fullRank" class="space-y-2"></div>
        <button id="closeRank" class="mt-6 w-full bg-gray-200 hover:bg-gray-300 font-bold py-3 rounded-xl">关闭</button>
    </div>
</div>

<div id="teacherModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto mx-4 flex flex-col">
        <h2 class="text-xl font-bold mb-4 text-center">👨‍🏫 学生答题记录</h2>
        <div id="recordList" class="space-y-2 text-sm flex-1 overflow-y-auto mb-4 border-y py-2"></div>
        <div class="flex gap-2 shrink-0">
            <button id="clearAll" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg font-bold">清空所有记录</button>
            <button id="closeTeacher" class="flex-1 bg-gray-200 hover:bg-gray-300 py-2 rounded-lg font-bold">关闭</button>
        </div>
    </div>
</div>

<script>
// ==========================================
// 请在这里填入你在 Bmob 申请的密钥！
// ==========================================
Bmob.initialize("b3c6ede3479e9cbd", "abc123def456gh78");

// ============== 核心配置 ==============
const CONFIG = {
    time: 600, // 10分钟
    perScore: 5,
    questions: [
        { img: "11.jpg", ans: "工业纯铁退火组织铁素体" },
        { img: "22.jpg", ans: "20钢退火组织铁素体+珠光体" },
        { img: "33.jpg", ans: "45钢退火组织铁素体+珠光体" },
        { img: "44.jpg", ans: "65钢退火组织铁素体+珠光体" },
        { img: "55.jpg", ans: "T8钢退火组织珠光体" },
        { img: "66.jpg", ans: "T12钢退火组织珠光体+二次渗碳体" },
        { img: "77.jpg", ans: "T12钢退火组织珠光体+二次渗碳体" },
        { img: "88.jpg", ans: "亚共晶生铁退火组织珠光体+二次渗碳体+莱氏体" },
        { img: "99.jpg", ans: "共晶生铁铸态组织共晶莱氏体" },
        { img: "1010.jpg", ans: "过共晶生铁铸态组织一次渗碳体+共晶莱氏体" },
        { img: "1313.jpg", ans: "T8钢等温淬火组织上贝氏体+淬火马氏体" },
        { img: "1414.jpg", ans: "T8钢等温淬火组织下贝氏体+淬火马氏体" },
        { img: "1515.jpg", ans: "20钢淬火组织板条马氏体" },
        { img: "1616.jpg", ans: "T8钢淬火组织针状马氏体+残余奥氏体" },
        { img: "2525.jpg", ans: "T12钢球化退火组织球状珠光体" },
        { img: "4646.jpg", ans: "灰口铸铁退火组织铁素体+片状石墨" },
        { img: "5151.jpg", ans: "球墨铸铁退火组织铁素体+球状石墨" },
        { img: "5555.jpg", ans: "ZL102铸态组织初晶硅晶体+共晶体" },
        { img: "5656.jpg", ans: "ZL102铸态组织初晶a固溶体+粒状共晶体" }
    ],
    words: [
        '工','业','纯','铁','退','火','组','织','素','体',
        '2','0','钢','4','5','6','T','8','珠','光','+',
        '1','2','二','次','渗','碳','亚','共','晶','生',
        '铸','态','莱','氏','过','一','等','温','淬','上',
        '贝','下','板','条','马','针','残','余','奥','球',
        '化','灰','铸','石','墨','片','Z','L','初','硅',
        '固','溶','粒','3','铝'
    ]
};

let allRecords = [];
let game = { q: 0, score: 0, left: CONFIG.time, timer: null, name: '', userAns: [], shuffled: [] };
let dom = {};

['coverPage','gamePage','nameModal','judgeModal','resultModal','rankModal','teacherModal',
 'startBtn','rankBtn','cancelName','okName','timer','score','curr','total','img','answerArea',
 'wordBank','nextQ','judgeText','rightAns','final','goRank','goHome','closeRank','playerCount',
 'teacherBtn','recordList','closeTeacher','clearAll','homeRank','fullRank','playerName',
 'prevBtn','nextBtn'].forEach(id => { dom[id] = document.getElementById(id); });

dom.total.textContent = CONFIG.questions.length;

// ==========================================
// 云端数据操作 (Bmob 后端云)
// ==========================================

// 1. 加载数据
async function loadCloudData() {
    const query = Bmob.Query("GameRecord");
    query.order("-score"); // 按分数降序
    query.limit(200); // 限制最多抓取200条
    try {
        const results = await query.find();
        allRecords = results.map(item => ({
            id: item.objectId,
            name: item.name,
            score: item.score,
            time: item.time,
            createdAt: new Date(item.createdAt).getTime()
        }));
        // 同分情况下，越早交卷排越前
        allRecords.sort((a, b) => b.score - a.score || a.createdAt - b.createdAt);
        refreshRank();
        if(!dom.teacherModal.classList.contains('hidden')) showRecords();
    } catch (error) {
        console.error("加载失败:", error);
        dom.homeRank.innerHTML = "<span class='text-red-500'>暂无数据或网络异常，请刷新</span>";
    }
}

// 2. 保存成绩
async function saveRecordToCloud() {
    const query = Bmob.Query('GameRecord');
    query.set("name", game.name);
    query.set("score", game.score);
    query.set("time", new Date().toLocaleString());

    try {
        await query.save();
        await loadCloudData(); // 保存后重新拉取最新排行榜
    } catch (error) {
        console.error("保存失败:", error);
    }
}

// 3. 老师清空记录
async function clearAllData() {
    if (!confirm("确定清空所有答题记录？操作后不可恢复！")) return;
    try {
        const query = Bmob.Query('GameRecord');
        let results = await query.find();
        // 逐条删除
        for (let item of results) {
            await query.destroy(item.objectId);
        }
        allRecords = [];
        refreshRank();
        showRecords();
        alert("已清空所有记录");
    } catch (error) {
        console.error("清空失败:", error);
        alert("清空失败，请重试。");
    }
}

// 首次打开页面加载数据
loadCloudData();

// ==========================================
// 游戏逻辑与 UI 操作
// ==========================================

dom.startBtn.onclick = () => { dom.playerName.value = ''; dom.nameModal.classList.remove('hidden'); };
dom.cancelName.onclick = () => dom.nameModal.classList.add('hidden');
dom.rankBtn.onclick = () => { showRank(); dom.rankModal.classList.remove('hidden'); };
dom.closeRank.onclick = () => dom.rankModal.classList.add('hidden');
dom.teacherBtn.onclick = () => { showRecords(); dom.teacherModal.classList.remove('hidden'); };
dom.closeTeacher.onclick = () => dom.teacherModal.classList.add('hidden');
dom.clearAll.onclick = clearAllData;
dom.goHome.onclick = () => { dom.resultModal.classList.add('hidden'); dom.coverPage.classList.remove('hidden'); loadCloudData(); };
dom.goRank.onclick = () => { dom.resultModal.classList.add('hidden'); showRank(); dom.rankModal.classList.remove('hidden'); };

dom.okName.onclick = () => {
    let n = dom.playerName.value.trim();
    if(!n) { alert('请输入姓名才能开始游戏哦~'); return; }
    game.name = n;
    dom.nameModal.classList.add('hidden');
    startGame();
};

function startGame(){
    game.q = 0; game.score = 0; game.left = CONFIG.time; game.userAns = [];
    dom.score.textContent = 0; dom.curr.textContent = 1;
    dom.coverPage.classList.add('hidden');
    dom.gamePage.classList.remove('hidden');
    shuffleWords(); renderQ(); startTimer();
}

function shuffleWords(){ game.shuffled = [...CONFIG.words].sort(()=>Math.random()-0.5); }

function renderQ(){
    let item = CONFIG.questions[game.q];
    dom.img.src = item.img;
    dom.answerArea.innerHTML = '';
    let len = item.ans.length;
    game.userAns = Array(len).fill('');

    for(let i=0; i<len; i++){
        let b = document.createElement('div');
        b.className = 'answer-box w-10 h-10 sm:w-12 sm:h-12 border-2 border-primary rounded-lg flex items-center justify-center text-lg sm:text-xl font-bold bg-white text-gray-800 shadow-sm';
        b.dataset.i = i;
        b.onclick = () => { game.userAns[i] = ''; updateAns(); };
        dom.answerArea.appendChild(b);
    }

    dom.wordBank.innerHTML = '';
    game.shuffled.forEach(w => {
        let btn = document.createElement('button');
        btn.className = 'word-btn bg-indigo-50 hover:bg-indigo-100 text-indigo-900 rounded-lg text-lg sm:text-xl font-bold h-12 shadow-sm border border-indigo-100';
        btn.textContent = w;
        btn.onclick = () => fillWord(w);
        dom.wordBank.appendChild(btn);
    });
    updateNavBtn();
}

function fillWord(w){
    let idx = game.userAns.indexOf('');
    if(idx===-1) return;
    game.userAns[idx] = w;
    updateAns();
    if(!game.userAns.includes('')) checkAns();
}

function updateAns(){
    let boxes = dom.answerArea.children;
    game.userAns.forEach((c,i) => boxes[i].textContent=c);
}

function checkAns(){
    let ok = game.userAns.join('') === CONFIG.questions[game.q].ans;
    if(ok) game.score += CONFIG.perScore;
    dom.score.textContent = game.score;

    dom.judgeText.textContent = ok ? '✅ 回答正确' : '❌ 回答错误';
    dom.judgeText.style.color = ok ? '#10b981' : '#ef4444';
    dom.rightAns.textContent = '正确答案：'+CONFIG.questions[game.q].ans;
    dom.judgeModal.classList.remove('hidden');
}

dom.prevBtn.onclick = () => {
    if(game.q <= 0) return;
    game.q--; dom.curr.textContent = game.q + 1;
    shuffleWords(); renderQ();
};

dom.nextBtn.onclick = () => {
    if(game.userAns.includes('')) { alert("请先完成本题拼字！"); return; }
    checkAns();
};

dom.nextQ.onclick = () => {
    dom.judgeModal.classList.add('hidden');
    if(game.q < CONFIG.questions.length -1){
        game.q++; dom.curr.textContent = game.q +1;
        shuffleWords(); renderQ();
    } else {
        finishGame();
    }
};

async function finishGame(){
    clearInterval(game.timer);
    dom.final.textContent = "计算中...";
    dom.resultModal.classList.remove('hidden');
    dom.gamePage.classList.add('hidden');
    await saveRecordToCloud();
    dom.final.textContent = game.score;
}

function updateNavBtn(){
    if(game.q === CONFIG.questions.length - 1){
        dom.nextBtn.textContent = '完成答题';
        dom.nextBtn.classList.replace('bg-primary', 'bg-green-600');
    } else {
        dom.nextBtn.textContent = '下一题 →';
        dom.nextBtn.classList.replace('bg-green-600', 'bg-primary');
    }
}

function startTimer(){
    clearInterval(game.timer);
    game.timer = setInterval(()=>{
        game.left--;
        let m = Math.floor(game.left/60).toString().padStart(2,'0');
        let s = (game.left%60).toString().padStart(2,'0');
        dom.timer.textContent = m+':'+s;
        if(game.left<=0){
            finishGame();
            alert('时间到！');
        }
    },1000);
}

function refreshRank() {
    dom.playerCount.textContent = allRecords.length;
    window.allRank = allRecords;

    let homeHtml = "";
    allRecords.slice(0, 5).forEach((it, i) => {
        let color = i == 0 ? "text-yellow-500" : i == 1 ? "text-gray-400" : i == 2 ? "text-amber-700" : "text-gray-700";
        homeHtml += `<div class="${color} font-medium flex justify-between"><span>${i + 1}. ${it.name}</span><span>${it.score}分</span></div>`;
    });
    dom.homeRank.innerHTML = homeHtml || "<span class='text-gray-400'>暂无学生参与，快来抢第一！</span>";
}

function showRank() {
    let rankList = window.allRank || [];
    let html = "";
    rankList.forEach((it, i) => {
        let c = i == 0 ? "bg-yellow-100 border-yellow-200" : i == 1 ? "bg-gray-100 border-gray-200" : i == 2 ? "bg-orange-50 border-orange-200" : "bg-white border-gray-100";
        html += `<div class="p-3 mb-2 rounded-lg border ${c} flex justify-between items-center shadow-sm">
            <span class="font-medium text-gray-800">${i + 1}. ${it.name}</span>
            <span class="font-bold text-primary">${it.score}分</span>
        </div>`;
    });
    dom.fullRank.innerHTML = html || "<div class='text-center text-gray-400 py-4'>暂无记录</div>";
}

function showRecords() {
    let list = [...allRecords].sort((a, b) => b.createdAt - a.createdAt);
    let html = "";
    list.forEach(it => {
        html += `<div class="border-b border-gray-100 py-2 flex justify-between items-center">
            <div><span class="font-bold text-gray-800">${it.name}</span><span class="text-xs text-gray-400 ml-2">${it.time}</span></div>
            <span class="font-bold text-primary">${it.score}分</span>
        </div>`;
    });
    dom.recordList.innerHTML = html || "<div class='text-center text-gray-400 py-4'>暂无提交记录</div>";
}
</script>
</body>
</html>
