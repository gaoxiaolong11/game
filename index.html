<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金相组织图谱学习游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                        gold: '#FFD700',
                        silver: '#C0C0C0',
                        bronze: '#CD7F32',
                    },
                    fontFamily: {
                        yuan: ['"Microsoft YaHei"', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:active {
            transform: scale(0.95);
        }
        #img {
            min-height: 200px;
            background: #f3f4f6;
            display: block;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen font-yuan">

<!-- 封面页 -->
<div id="coverPage" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-xl w-full text-center">
        <h1 class="text-4xl font-bold text-primary mb-4">🏆 金相组织图谱学习游戏</h1>
        <p class="text-gray-600 mb-6">看图选择题，答对一题5分，限时10分钟</p>

        <div class="mb-6 p-4 bg-blue-50 rounded-xl">
            <h3 class="font-bold text-lg mb-2">📊 排行榜</h3>
            <div id="homeRank" class="text-left space-y-1"></div>
        </div>

        <button id="startBtn" class="bg-primary text-white text-xl font-bold py-3 px-8 rounded-xl w-full">
            开始学习
        </button>
        <button id="rankBtn" class="mt-3 text-indigo-600 text-sm underline">查看完整排行榜</button>
        <p class="text-gray-500 mt-4 text-sm">已有 <span id="playerCount">0</span> 位同学参与</p>
    </div>
</div>

<!-- 姓名弹窗 -->
<div id="nameModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4">
        <h2 class="text-xl font-bold mb-4 text-center">请输入姓名</h2>
        <input id="playerName" class="w-full border border-gray-300 rounded-lg p-3 mb-4" placeholder="输入你的名字">
        <div class="flex gap-2">
            <button id="cancelName" class="flex-1 bg-gray-200 py-2 rounded-lg">取消</button>
            <button id="okName" class="flex-1 bg-primary text-white py-2 rounded-lg">开始学习</button>
        </div>
    </div>
</div>

<!-- 游戏页 -->
<div id="gamePage" class="min-h-screen p-4 hidden">
    <div class="max-w-xl mx-auto">
        <div class="flex justify-between bg-white p-3 rounded-xl shadow mb-3">
            <div class="font-bold">⏱️ <span id="timer">10:00</span></div>
            <div class="font-bold text-primary">⭐ 得分：<span id="score">0</span></div>
            <div class="font-bold"><span id="curr">1</span>/<span id="total">19</span></div>
        </div>

        <div class="bg-white rounded-2xl p-5 shadow mb-4 text-center">
            <p class="text-gray-700 mb-3">识别金相组织，选择正确名称</p>
            <img id="img" src="" class="max-h-64 mx-auto rounded-lg shadow mb-6" alt="金相组织图片">
            <div id="imgLoading" class="text-gray-500 mb-4 hidden">📷 图片加载中...</div>

            <div id="optionsArea" class="space-y-3 mb-4"></div>

            <div class="flex justify-center gap-4 mt-3">
                <button id="prevBtn" class="bg-gray-500 text-white py-2 px-5 rounded-lg">← 上一题</button>
                <button id="nextBtn" class="bg-primary text-white py-2 px-5 rounded-lg">下一题 →</button>
            </div>
        </div>

        <div class="text-center mt-4">
            <button id="teacherBtn" class="text-gray-500 text-sm">👨‍🏫 老师查看答题记录</button>
        </div>
    </div>
</div>

<!-- 判题弹窗 -->
<div id="judgeModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 text-center max-w-sm w-full">
        <h2 id="judgeText" class="text-2xl font-bold mb-2"></h2>
        <p class="mb-4" id="rightAns"></p>
        <button id="nextQ" class="bg-primary text-white px-6 py-2 rounded-xl">继续学习</button>
    </div>
</div>

<!-- 结果页 -->
<div id="resultModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 text-center max-w-sm w-full">
        <h2 class="text-2xl font-bold mb-2">🎉 图谱学习完成</h2>
        <p class="text-xl mb-4">最终得分：<span id="final" class="text-primary font-bold">0</span> 分</p>
        <div class="flex gap-2">
            <button id="goRank" class="flex-1 bg-indigo-500 text-white py-2 rounded-lg">查看排行榜</button>
            <button id="goHome" class="flex-1 bg-primary text-white py-2 rounded-lg">返回首页</button>
        </div>
    </div>
</div>

<!-- 完整排行榜 -->
<div id="rankModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto">
        <h2 class="text-xl font-bold mb-4 text-center">🏅 学习排行榜</h2>
        <div id="fullRank" class="space-y-2"></div>
        <button id="closeRank" class="mt-4 w-full bg-gray-200 py-2 rounded-lg">关闭</button>
    </div>
</div>

<!-- 老师记录页 -->
<div id="teacherModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full max-h-[80vh] overflow-y-auto">
        <h2 class="text-xl font-bold mb-4 text-center">学生图谱学习记录</h2>
        <div id="recordList" class="space-y-1 text-sm"></div>
        <div class="flex gap-2 mt-4">
            <button id="clearAll" class="flex-1 bg-red-500 text-white py-2 rounded-lg">清空记录</button>
            <button id="closeTeacher" class="flex-1 bg-gray-200 py-2 rounded-lg">关闭</button>
        </div>
    </div>
</div>

<script>
// ============== 核心配置 ==============
const CONFIG = {
    time: 1800,
    perScore: 5,
    questions: [
        { img: "11.jpg", ans: "工业纯铁退火组织铁素体" },
        { img: "22.jpg", ans: "20钢退火组织铁素体+珠光体" },
        { img: "33.jpg", ans: "45钢退火组织铁素体+珠光体" },
        { img: "44.jpg", ans: "65钢退火组织铁素体+珠光体" },
        { img: "55.jpg", ans: "T8钢退火组织珠光体" },
        { img: "66.jpg", ans: "T12钢退火组织珠光体+二次渗碳体" },
        { img: "77.jpg", ans: "T12钢退火组织珠光体+二次渗碳体" },
        { img: "88.jpg", ans: "亚共晶生铁退火组织珠光体+二次渗碳体+莱氏体" },
        { img: "99.jpg", ans: "共晶生铁铸态组织共晶莱氏体" },
        { img: "1010.jpg", ans: "过共晶生铁铸态组织一次渗碳体+共晶莱氏体" },
        { img: "1313.jpg", ans: "T8钢等温淬火组织上贝氏体+淬火马氏体" },
        { img: "1414.jpg", ans: "T8钢等温淬火组织下贝氏体+淬火马氏体" },
        { img: "1515.jpg", ans: "20钢淬火组织板条马氏体" },
        { img: "1616.jpg", ans: "T8钢淬火组织针状马氏体+残余奥氏体" },
        { img: "2525.jpg", ans: "T12钢球化退火组织球状珠光体" },
        { img: "4646.jpg", ans: "灰口铸铁退火组织铁素体+片状石墨" },
        { img: "5151.jpg", ans: "球墨铸铁退火组织铁素体+球状石墨" },
        { img: "5555.jpg", ans: "ZL102铸态组织初晶硅晶体+共晶体" },
        { img: "5656.jpg", ans: "ZL102铸态组织初晶a固溶体+粒状共晶体" }
    ]
};

// 云端存储配置
const CLOUD_DB = {
    url: "https://api.jsonbin.io/v3/b/67f289a6ad19ca34f8c19235",
    key: "$2a$10$QpZxQl8u1eHT5t1G2t5VbuHw0zJzJzJzJzJzJzJzJzJzJzJzJzJz"
};

// 游戏状态
let game = { q:0, score:0, left:CONFIG.time, timer:null, name:'', preImages:[] };

// DOM 元素
let dom = {};
['coverPage','gamePage','nameModal','judgeModal','resultModal','rankModal','teacherModal',
 'startBtn','rankBtn','cancelName','okName','timer','score','curr','total','img','optionsArea',
 'nextQ','judgeText','rightAns','final','goRank','goHome','closeRank','playerCount','imgLoading',
 'teacherBtn','recordList','closeTeacher','clearAll','homeRank','fullRank','playerName','prevBtn','nextBtn'].forEach(id=>{ dom[id] = document.getElementById(id); });

dom.total.textContent = CONFIG.questions.length;
loadCloudData();

// ==============================================
// ✅ 【关键修复】图片预加载（进入游戏就全部下载好）
// ==============================================
function preloadAllImages() {
    game.preImages = [];
    CONFIG.questions.forEach(q => {
        const img = new Image();
        img.src = q.img;
        game.preImages.push(img);
    });
}

// 封面事件
dom.startBtn.onclick = () => dom.nameModal.classList.remove('hidden');
dom.cancelName.onclick = () => dom.nameModal.classList.add('hidden');
dom.rankBtn.onclick = () => { showRank(); dom.rankModal.classList.remove('hidden'); }
dom.closeRank.onclick = () => dom.rankModal.classList.add('hidden');
dom.teacherBtn.onclick = () => { showRecords(); dom.teacherModal.classList.remove('hidden'); }
dom.closeTeacher.onclick = () => dom.teacherModal.classList.add('hidden');
dom.clearAll.onclick = clearAllData;
dom.goHome.onclick = () => { dom.resultModal.classList.add('hidden'); dom.coverPage.classList.remove('hidden'); }
dom.goRank.onclick = () => { dom.resultModal.classList.add('hidden'); showRank(); dom.rankModal.classList.remove('hidden'); }

// 开始游戏
dom.okName.onclick = () => {
    let n = dom.playerName.value.trim();
    if (!n) { alert('请输入姓名'); return; }
    game.name = n;
    dom.nameModal.classList.add('hidden');
    
    preloadAllImages(); // 预加载
    startGame();
};

// 开始游戏
function startGame() {
    game.q = 0; game.score = 0; game.left = CONFIG.time;
    dom.score.textContent = 0; dom.curr.textContent = 1;
    dom.coverPage.classList.add('hidden');
    dom.gamePage.classList.remove('hidden');
    renderQ();
    startTimer();
}

// 生成选项
function generateOptions() {
    const correct = CONFIG.questions[game.q].ans;
    const all = CONFIG.questions.map(x => x.ans);
    let wrong = all.filter(x => x !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
    return [correct, ...wrong].sort(() => Math.random() - 0.5);
}

// ==============================================
// ✅ 【关键修复】切题瞬间清空图片 + 显示加载
// ==============================================
function renderQ() {
    let item = CONFIG.questions[game.q];
    
    // 切题立刻清空图片，防止显示上一张
    dom.img.src = '';
    dom.img.classList.add('opacity-50');
    dom.imgLoading.classList.remove('hidden');

    // 加载完成后显示
    let tempImg = new Image();
    tempImg.src = item.img;
    tempImg.onload = () => {
        dom.img.src = item.img;
        dom.img.classList.remove('opacity-50');
        dom.imgLoading.classList.add('hidden');
    };

    // 渲染选项
    const options = generateOptions();
    dom.optionsArea.innerHTML = '';
    options.forEach((opt, i) => {
        let btn = document.createElement('button');
        btn.className = 'option-btn w-full bg-blue-100 hover:bg-blue-200 rounded-lg p-3 text-left text-lg font-bold';
        btn.innerHTML = `(${String.fromCharCode(65 + i)}) ${opt}`;
        btn.onclick = () => selectOption(opt);
        dom.optionsArea.appendChild(btn);
    });

    updateNavBtn();
}

// 选择答案
function selectOption(selected) {
    const correct = CONFIG.questions[game.q].ans;
    const ok = selected === correct;
    if (ok) game.score += CONFIG.perScore;
    dom.score.textContent = game.score;

    dom.judgeText.textContent = ok ? '✅ 回答正确' : '❌ 回答错误';
    dom.judgeText.style.color = ok ? '#10b981' : '#ef4444';
    dom.rightAns.textContent = '正确名称：' + correct;
    dom.judgeModal.classList.remove('hidden');
}

// 上一题 / 下一题
function prevQuestion() {
    if (game.q <= 0) return;
    game.q--;
    dom.curr.textContent = game.q + 1;
    renderQ();
}
function nextQuestion() {
    if (game.q < CONFIG.questions.length - 1) {
        game.q++;
        dom.curr.textContent = game.q + 1;
        renderQ();
    } else {
        finishGame();
    }
}

dom.prevBtn.onclick = prevQuestion;
dom.nextBtn.onclick = () => { dom.judgeModal.classList.add('hidden'); nextQuestion(); };
dom.nextQ.onclick = () => { dom.judgeModal.classList.add('hidden'); nextQuestion(); };

// 按钮状态
function updateNavBtn() {
    if (game.q === CONFIG.questions.length - 1) {
        dom.nextBtn.textContent = '完成学习';
        dom.nextBtn.className = 'bg-green-600 text-white py-2 px-5 rounded-lg';
    } else {
        dom.nextBtn.textContent = '下一题 →';
        dom.nextBtn.className = 'bg-primary text-white py-2 px-5 rounded-lg';
    }
}

// 倒计时
function startTimer() {
    clearInterval(game.timer);
    game.timer = setInterval(() => {
        game.left--;
        let m = Math.floor(game.left / 60).toString().padStart(2, '0');
        let s = (game.left % 60).toString().padStart(2, '0');
        dom.timer.textContent = m + ':' + s;
        if (game.left <= 0) { finishGame(); alert('时间到！'); }
    }, 1000);
}

// 结束游戏
function finishGame() {
    clearInterval(game.timer);
    saveRecordToCloud();
    dom.final.textContent = game.score;
    dom.resultModal.classList.remove('hidden');
    dom.gamePage.classList.add('hidden');
}

// 云端数据
let allRecords = [];
async function loadCloudData() {
    try {
        let res = await fetch(CLOUD_DB.url, { headers: { "X-Access-Key": CLOUD_DB.key } });
        let data = await res.json();
        allRecords = data.record || [];
        refreshRank();
    } catch (e) { allRecords = []; refreshRank(); }
}
async function saveRecordToCloud() {
    allRecords.push({ name: game.name, score: game.score, time: new Date().toLocaleString() });
    await fetch(CLOUD_DB.url, {
        method: "PUT", headers: { "Content-Type": "application/json", "X-Access-Key": CLOUD_DB.key },
        body: JSON.stringify({ record: allRecords })
    });
    refreshRank();
}
async function clearAllData() {
    if (!confirm("确定清空？")) return;
    allRecords = [];
    await fetch(CLOUD_DB.url, {
        method: "PUT", headers: { "Content-Type": "application/json", "X-Access-Key": CLOUD_DB.key },
        body: JSON.stringify({ record: [] })
    });
    refreshRank(); showRecords();
}
function refreshRank() {
    dom.playerCount.textContent = allRecords.length;
    let rank = [...allRecords].sort((a, b) => b.score - a.score);
    window.allRank = rank;
    let homeHtml = "";
    rank.slice(0, 5).forEach((it, i) => {
        let color = i == 0 ? "text-yellow-500" : i == 1 ? "text-gray-400" : i == 2 ? "text-amber-700" : "text-gray-700";
        homeHtml += `<div class="${color}">${i + 1}. ${it.name} — ${it.score}分</div>`;
    });
    dom.homeRank.innerHTML = homeHtml || "暂无排行";
}
function showRank() {
    let html = "";
    allRank.forEach((it, i) => {
        let c = i == 0 ? "bg-yellow-100" : i == 1 ? "bg-gray-100" : i == 2 ? "bg-amber-100" : "bg-gray-50";
        html += `<div class="p-2 rounded ${c} flex justify-between"><span>${i + 1}. ${it.name}</span><span class="font-bold">${it.score}分</span></div>`;
    });
    dom.fullRank.innerHTML = html || "暂无记录";
}
function showRecords() {
    let html = "";
    allRecords.forEach(it => { html += `<div class="border-b pb-1">${it.name} · ${it.score}分 · ${it.time}</div>`; });
    dom.recordList.innerHTML = html || "暂无记录";
}
</script>
</body>
</html>
